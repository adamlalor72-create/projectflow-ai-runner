name: Cartographer CI

on:
  push:
    paths:
      - 'packages/cartographer/**'
      - '.github/workflows/cartographer-ci.yml'
  pull_request:
    paths:
      - 'packages/cartographer/**'
      - '.github/workflows/cartographer-ci.yml'

defaults:
  run:
    working-directory: packages/cartographer

jobs:
  typecheck:
    name: TypeScript check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
        working-directory: .
      - run: npx tsc --noEmit

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
        working-directory: .
      - run: npx eslint . --ext .ts

  schema-validation:
    name: Schema validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
        working-directory: .
      - run: node --import tsx test/validate-schemas.ts

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
        working-directory: .
      - run: npx vitest run

  contracts:
    name: Contract conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
        working-directory: .
      - run: npx vitest run --testPathPattern='contract'
