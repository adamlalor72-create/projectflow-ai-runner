---
applications:
  - name: dealflow-ai-runner
    memory: 1G
    disk_quota: 2G
    instances: 1
    buildpacks:
      - nodejs_buildpack
    command: bash start-cf.sh
    health-check-type: process
    no-route: true
    env:
      NODE_ENV: production
      CF_RUNNER: "true"
      HEADLESS: "true"
      DISPLAY: ":99"
